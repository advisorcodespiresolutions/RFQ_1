version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bayer_partner_db
    environment:
      POSTGRES_DB: bayer_partner_ecosystem
      POSTGRES_USER: bayer_user
      POSTGRES_PASSWORD: bayer_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bayer_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bayer_user -d bayer_partner_ecosystem"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bayer_partner_backend
    environment:
      - DATABASE_URL=postgresql://bayer_user:bayer_password@postgres:5432/bayer_partner_ecosystem
      - SECRET_KEY=bayer-secret-key-change-in-production
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DEBUG=true
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=10485760
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bayer_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bayer_partner_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bayer_network
    command: npm start

  # Nginx Reverse Proxy (Optional - for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: bayer_partner_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bayer_network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  bayer_network:
    driver: bridge